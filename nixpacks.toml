# nixpacks.toml — Railway build configuration for Wesley AI
# Required to provide Chromium system libraries for Playwright.
#
# Phase order: setup → install → build → start
#
# [phases.install] is intentionally OMITTED so nixpacks auto-detects Python
# from requirements.txt and runs `pip install -r requirements.txt` using its
# own managed Python/pip environment. Overriding that phase would shadow the
# pip binary and cause "pip command not found".
#
# [phases.build] runs AFTER pip has installed the playwright package, so the
# `playwright` CLI is available when we download the Chromium browser binary.

[phases.setup]
nixPkgs = [
  "at-spi2-atk",
  "cairo",
  "cups",
  "expat",
  "glib",
  "gtk3",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "nss",
  "pango",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "alsa-lib",
]

[phases.build]
cmds = ["playwright install chromium"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120"
