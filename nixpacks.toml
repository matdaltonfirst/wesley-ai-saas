# nixpacks.toml — Railway build configuration for Wesley AI
# Required to provide Chromium system libraries for Playwright.

[phases.setup]
nixPkgs = [
  "at-spi2-atk",
  "cairo",
  "cups",
  "expat",
  "glib",
  "gtk3",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "nss",
  "pango",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "alsa-lib",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120"
