<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wesley AI — {% if mode == 'signup' %}Create Account{% else %}Sign In{% endif %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:       #1695a0;
      --accent-hover: #127f88;
      --accent-ring:  rgba(22,149,160,0.2);
      --font: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --text:         #1f2328;
      --text-muted:   #656d76;
      --border:       #d0d7de;
      --radius:       10px;
      --shadow:       0 8px 32px rgba(12,61,67,0.1);
      --duration:     0.2s;
      --ease:         cubic-bezier(0.4, 0, 0.2, 1);
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0fafb 0%, #e8f5f6 50%, #f4fbfb 100%);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }
    .auth-card {
      background: #fff;
      border: 1px solid rgba(41,171,181,0.12);
      border-radius: 18px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: cardIn 0.4s var(--ease);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-logo {
      height: 48px;
      width: auto;
    }
    .tabs {
      display: flex;
      background: #f4f8f8;
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 32px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 0;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      border-radius: 7px;
      transition: all var(--duration) var(--ease);
    }
    .tab-btn.active {
      color: var(--text);
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-weight: 600;
    }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeIn 0.25s var(--ease); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color var(--duration) var(--ease),
                  box-shadow var(--duration) var(--ease);
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-ring);
    }
    input::placeholder { color: #94a3b8; }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background var(--duration) var(--ease),
                  transform 0.1s var(--ease),
                  box-shadow var(--duration) var(--ease);
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(41,171,181,0.25);
    }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled { background: #a0d4d8; cursor: not-allowed; }

    /* Loading spinner inside button */
    .submit-btn .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 0.8125rem;
      margin-bottom: 18px;
      display: none;
      line-height: 1.5;
      animation: shakeIn 0.3s var(--ease);
    }
    @keyframes shakeIn {
      0%   { transform: translateX(-6px); opacity: 0; }
      40%  { transform: translateX(4px); }
      70%  { transform: translateX(-2px); }
      100% { transform: translateX(0); opacity: 1; }
    }
    .error-msg.visible { display: block; }
    .switch-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .switch-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--duration);
    }
    .switch-link a:hover { color: var(--accent-hover); text-decoration: underline; }
    .forgot-link {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
      font-size: 0.8125rem;
    }
    .forgot-link a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--duration);
    }
    .forgot-link a:hover { color: var(--accent-hover); text-decoration: underline; }
    .success-banner {
      background: #ecfdf5;
      border: 1px solid #6ee7b7;
      color: #065f46;
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 0.8125rem;
      margin-bottom: 18px;
      display: none;
      line-height: 1.5;
      animation: fadeIn 0.3s var(--ease);
    }
    .success-banner.visible { display: flex; align-items: center; gap: 8px; }
    .success-banner svg { flex-shrink: 0; }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px 28px; border-radius: 14px; }
      input      { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="auth-card">

    <div class="brand">
      <img src="/static/WesleyAI.png" alt="Wesley AI" class="brand-logo" />
    </div>

    <div class="tabs">
      <button class="tab-btn {% if mode == 'login' %}active{% endif %}" data-tab="login">Sign In</button>
      <button class="tab-btn {% if mode == 'signup' %}active{% endif %}" data-tab="signup">Create Account</button>
    </div>

    <!-- Login -->
    <div class="form-panel {% if mode == 'login' %}active{% endif %}" id="panelLogin">
      <div class="success-banner" id="resetBanner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Password updated — please sign in.
      </div>
      <div class="error-msg" id="loginError"></div>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@church.org" autocomplete="email" />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
      </div>
      <div class="forgot-link"><a href="/forgot-password">Forgot password?</a></div>
      <button class="submit-btn" id="loginBtn">Sign In</button>
      <div class="switch-link">Don't have an account? <a href="/signup">Create one</a></div>
    </div>

    <!-- Signup -->
    <div class="form-panel {% if mode == 'signup' %}active{% endif %}" id="panelSignup">
      <div class="error-msg" id="signupError"></div>
      <div class="field">
        <label for="signupChurch">Church Name</label>
        <input type="text" id="signupChurch" placeholder="First United Methodist Church" autocomplete="organization" />
      </div>
      <div class="field">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="you@church.org" autocomplete="email" />
      </div>
      <div class="field">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="At least 8 characters" autocomplete="new-password" />
      </div>
      <button class="submit-btn" id="signupBtn">Create Account</button>
      <div class="switch-link">Already have an account? <a href="/login">Sign in</a></div>
    </div>

  </div>

  <script>
    // ── Show success banner after password reset ───────────────────────────────
    if (new URLSearchParams(window.location.search).get("reset") === "1") {
      document.getElementById("resetBanner").classList.add("visible");
      history.replaceState(null, "", "/login");
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach(b =>
          b.classList.toggle("active", b.dataset.tab === tab)
        );
        document.querySelectorAll(".form-panel").forEach(p =>
          p.classList.toggle("active", p.id === "panel" + tab.charAt(0).toUpperCase() + tab.slice(1))
        );
      });
    });

    function showError(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.classList.add("visible");
    }
    function clearError(elId) {
      const el = document.getElementById(elId);
      el.textContent = "";
      el.classList.remove("visible");
    }

    const _csrfToken = document.querySelector('meta[name="csrf-token"]').content;

    // ── Login ─────────────────────────────────────────────────────────────────
    document.getElementById("loginBtn").addEventListener("click", async () => {
      clearError("loginError");
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!email || !password) {
        showError("loginError", "Please enter your email and password.");
        return;
      }
      const btn = document.getElementById("loginBtn");
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Signing in…';
      try {
        const res  = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": _csrfToken },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (res.ok) { window.location.href = "/"; }
        else { showError("loginError", data.error || "Login failed."); }
      } catch {
        showError("loginError", "Network error. Please try again.");
      } finally {
        btn.disabled = false; btn.textContent = "Sign In";
      }
    });

    // ── Signup ────────────────────────────────────────────────────────────────
    document.getElementById("signupBtn").addEventListener("click", async () => {
      clearError("signupError");
      const church_name = document.getElementById("signupChurch").value.trim();
      const email       = document.getElementById("signupEmail").value.trim();
      const password    = document.getElementById("signupPassword").value;
      if (!church_name || !email || !password) {
        showError("signupError", "All fields are required.");
        return;
      }
      if (password.length < 8) {
        showError("signupError", "Password must be at least 8 characters.");
        return;
      }
      const btn = document.getElementById("signupBtn");
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Creating account…';
      try {
        const res  = await fetch("/api/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": _csrfToken },
          body: JSON.stringify({ church_name, email, password }),
        });
        const data = await res.json();
        if (res.ok) { window.location.href = "/"; }
        else { showError("signupError", data.error || "Signup failed."); }
      } catch {
        showError("signupError", "Network error. Please try again.");
      } finally {
        btn.disabled = false; btn.textContent = "Create Account";
      }
    });

    // Enter submits whichever form is active
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const loginActive = document.getElementById("panelLogin").classList.contains("active");
      if (loginActive) document.getElementById("loginBtn").click();
      else document.getElementById("signupBtn").click();
    });
  </script>
</body>
</html>
