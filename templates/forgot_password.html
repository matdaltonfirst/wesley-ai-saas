<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Wesley AI</title>
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:       #29abb5;
      --accent-hover: #1f969f;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", sans-serif;
    }
    body {
      min-height: 100vh;
      background: #f4fbfb;
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .auth-card {
      background: #fff;
      border: 1px solid #cce6e8;
      border-radius: 16px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(12,61,67,0.08);
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo { height: 48px; width: auto; }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1f2328;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 0.86rem;
      color: #656d76;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #1f2328;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d0d7de;
      border-radius: 9px;
      font-family: var(--font);
      font-size: 0.93rem;
      color: #1f2328;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(41,171,181,0.12);
    }
    .submit-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: var(--font);
      font-size: 0.94rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .submit-btn:disabled { background: #a0d4d8; cursor: not-allowed; }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.84rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.45;
    }
    .error-msg.visible { display: block; }

    /* Success state */
    .success-state { display: none; }
    .success-icon {
      width: 52px;
      height: 52px;
      background: #d1fae5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.3rem;
    }
    .success-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1f2328;
      text-align: center;
      margin-bottom: 10px;
    }
    .success-desc {
      font-size: 0.87rem;
      color: #656d76;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.84rem;
      color: #656d76;
    }
    .back-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px 24px; }
      /* Prevent iOS Safari from auto-zooming when tapping inputs */
      input      { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="auth-card">

    <div class="brand">
      <img src="/static/WesleyAI.png" alt="Wesley AI" class="brand-logo" />
    </div>

    <!-- Form state -->
    <div id="formState">
      <h1 class="card-title">Forgot your password?</h1>
      <p class="card-desc">Enter the email address for your account and we'll send you a reset link.</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput" placeholder="you@church.org" autocomplete="email" />
      </div>

      <button class="submit-btn" id="submitBtn">Send reset link</button>
      <div class="back-link"><a href="/login">← Back to sign in</a></div>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="success-icon">✉️</div>
      <h2 class="success-title">Check your email</h2>
      <p class="success-desc">
        If that email address is in our system, we've sent a password reset link.
        It will expire in <strong>1 hour</strong>.
      </p>
      <div class="back-link"><a href="/login">← Back to sign in</a></div>
    </div>

  </div>

  <script>
    const _csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    const emailInput = document.getElementById("emailInput");
    const submitBtn  = document.getElementById("submitBtn");
    const errorMsg   = document.getElementById("errorMsg");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("visible");
    }

    submitBtn.addEventListener("click", async () => {
      errorMsg.classList.remove("visible");
      const email = emailInput.value.trim();
      if (!email) { showError("Please enter your email address."); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";

      try {
        await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": _csrfToken },
          body: JSON.stringify({ email }),
        });
        // Always show success regardless of API response
        document.getElementById("formState").style.display = "none";
        document.getElementById("successState").style.display = "block";
      } catch {
        showError("Network error. Please try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Send reset link";
      }
    });

    emailInput.addEventListener("keydown", e => {
      if (e.key === "Enter") submitBtn.click();
    });
  </script>
</body>
</html>
