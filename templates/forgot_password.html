<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Wesley AI</title>
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:       #1695a0;
      --accent-hover: #127f88;
      --accent-ring:  rgba(22,149,160,0.2);
      --font: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0fafb 0%, #e8f5f6 50%, #f4fbfb 100%);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes shakeIn {
      0%   { transform: translateX(-6px); opacity: 0; }
      40%  { transform: translateX(4px); }
      70%  { transform: translateX(-2px); }
      100% { transform: translateX(0); opacity: 1; }
    }
    .auth-card {
      background: #fff;
      border: 1px solid rgba(41,171,181,0.12);
      border-radius: 18px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(12,61,67,0.1);
      animation: cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo { height: 48px; width: auto; }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1f2328;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 0.8125rem;
      color: #656d76;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #1f2328;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d0d7de;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: #1f2328;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-ring);
    }
    .submit-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(41,171,181,0.25);
    }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled { background: #a0d4d8; cursor: not-allowed; }
    .submit-btn .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8125rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.45;
    }
    .error-msg.visible {
      display: block;
      animation: shakeIn 0.35s ease-out;
    }

    /* Success state */
    .success-state { display: none; }
    .success-icon {
      width: 52px;
      height: 52px;
      background: #d1fae5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.3rem;
    }
    .success-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1f2328;
      text-align: center;
      margin-bottom: 10px;
    }
    .success-desc {
      font-size: 0.8125rem;
      color: #656d76;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.8125rem;
      color: #656d76;
    }
    .back-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px 24px; }
      /* Prevent iOS Safari from auto-zooming when tapping inputs */
      input      { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="auth-card">

    <div class="brand">
      <img src="/static/WesleyAI.png" alt="Wesley AI" class="brand-logo" />
    </div>

    <!-- Form state -->
    <div id="formState">
      <h1 class="card-title">Forgot your password?</h1>
      <p class="card-desc">Enter the email address for your account and we'll send you a reset link.</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput" placeholder="you@church.org" autocomplete="email" />
      </div>

      <button class="submit-btn" id="submitBtn">Send reset link</button>
      <div class="back-link"><a href="/login">← Back to sign in</a></div>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="success-icon">✉️</div>
      <h2 class="success-title">Check your email</h2>
      <p class="success-desc">
        If that email address is in our system, we've sent a password reset link.
        It will expire in <strong>1 hour</strong>.
      </p>
      <div class="back-link"><a href="/login">← Back to sign in</a></div>
    </div>

  </div>

  <script>
    const _csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    const emailInput = document.getElementById("emailInput");
    const submitBtn  = document.getElementById("submitBtn");
    const errorMsg   = document.getElementById("errorMsg");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("visible");
    }

    submitBtn.addEventListener("click", async () => {
      errorMsg.classList.remove("visible");
      const email = emailInput.value.trim();
      if (!email) { showError("Please enter your email address."); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";

      try {
        await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": _csrfToken },
          body: JSON.stringify({ email }),
        });
        // Always show success regardless of API response
        document.getElementById("formState").style.display = "none";
        document.getElementById("successState").style.display = "block";
      } catch {
        showError("Network error. Please try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Send reset link";
      }
    });

    emailInput.addEventListener("keydown", e => {
      if (e.key === "Enter") submitBtn.click();
    });
  </script>
</body>
</html>
